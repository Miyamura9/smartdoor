# Mosquitto MQTT Broker Configuration
# Smart Door Lock IoT System

# Network listener - TCP
listener 1883
protocol mqtt

# WebSocket listener (for future browser-based MQTT clients)
listener 9001
protocol websockets

# Allow anonymous connections (demo mode)
# For production: set allow_anonymous false and configure password_file
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Message settings
max_queued_messages 1000
message_size_limit 0

# Connection settings
max_keepalive 65535
